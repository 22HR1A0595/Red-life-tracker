<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VitalDiet - Blood Health Guidance</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background-color:#fff4f4;
margin:0;
}

.header{
display:flex;
align-items:center;
padding:15px 20px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo-title{
display:flex;
align-items:center;
}

.logo{
width:40px;
margin-right:10px;
}

.title{
font-size:24px;
color:#b30000;
font-weight:bold;
}

.nav{
background:#eee;
padding:10px 20px;
display:flex;
flex-wrap:wrap;
gap:15px;
}

.nav a{
text-decoration:none;
color:#333;
font-weight:bold;
padding:8px 16px;
border-radius:5px;
}

.nav a:hover{
background:#ddd;
}

.container{
width:90%;
max-width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
color:#b30000;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#b30000;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:15px;
width:100%;
}

button:hover{
background:#990000;
}

#status{
margin-top:10px;
padding:10px;
border-radius:6px;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

</style>
</head>

<body>

<div class="header">
<div class="logo-title">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3Q_N9vZXViORiWRyuWDQN9Q8b27SOSChaGw&s" class="logo">
<div class="title">VitalDiet</div>
</div>
</div>

<div class="nav">
<a href="index.html">Home</a>
<a href="register.html">Become a Donor</a>
<a href="donors.html">Donor List</a>
<a href="request.html">Need Help?</a>
<a href="diet.html">VitalDiet</a>
<a href="contact.html">Contact</a>
</div>

<div class="container">

<h2>Contact Us</h2>

<form id="contactForm">

<label>Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Message</label>
<textarea id="message" rows="4" required></textarea>

<button type="submit">Send</button>

</form>

<div id="status"></div>

</div>

<script>

const PUBLIC_KEY = "IhsT-epfEJs6WZmTk";
const SERVICE_ID = "service_oqjuygs";
const TEMPLATE_ID = "template_xd4zmxb";

emailjs.init(PUBLIC_KEY);

const form = document.getElementById("contactForm");
const status = document.getElementById("status");

form.addEventListener("submit", function(e){

e.preventDefault();

status.textContent="Sending message...";
status.className="";

const params = {
name: document.getElementById("name").value,
to_email: document.getElementById("email").value,
message: document.getElementById("message").value
};

emailjs.send(
SERVICE_ID,
TEMPLATE_ID,
params
)

.then(function(){

status.textContent="✅ Message sent successfully!";
status.className="success";

form.reset();

})

.catch(function(error){

status.textContent="❌ Failed to send email";
status.className="error";

console.log(error);

});

});

</script>

</body>
</html>
