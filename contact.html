<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us -Red Life Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fdf6f6;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .logo-title {
      display: flex;
      align-items: center;
    }

    .logo {
      width: 40px;
      margin-right: 10px;
    }

    .title {
      font-size: 24px;
      color: #b30000;
      font-weight: bold;
    }

    .nav {
      background-color: #eee;
      padding: 10px 20px;
      display: flex;
      gap: 20px;
    }

    .nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 5px;
    }

    .nav a:hover {
      background-color: #ddd;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      color: #b30000;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      background-color: #b30000;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #990000;
    }

    .success {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-title">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3Q_N9vZXViORiWRyuWDQN9Q8b27SOSChaGw&s" class="logo" alt="logo">
      <div class="title">Red Life Tracker</div>
    </div>
  </div>
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="register.html">Become a Donor</a>
    <a href="donors.html">Donor List</a>
    <a href="request.html">Need Help?</a>
    <a href="diet.html">VitalDiet</a>
    <a href="contact.html">Contact</a>
  </div>

 
  <div class="container">
    <h2>Contact Us</h2>
    <p>Have a question, suggestion, or need support? Fill in the form below and we’ll get back to you soon.</p>

    <form onsubmit="submitContactForm(event)">
      <label>Name:</label>
      <input type="text" id="name" placeholder="Your Name" required>
      <label>Email:</label>
      <input type="email" id="email" placeholder="Your Email" required>
      <label>Message:</label>
      <textarea id="message" rows="4" placeholder="Type your message here..." required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <p id="successMsg" class="success"></p>
  </div>

  <script>
    function submitContactForm(event) {
      event.preventDefault();

      const contact = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      let contactMessages = JSON.parse(localStorage.getItem("contactMessages")) || [];
      contactMessages.push(contact);
      localStorage.setItem("contactMessages", JSON.stringify(contactMessages));

      document.getElementById("successMsg").textContent = "✅ Your message has been received. Thank you!";

      
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("message").value = "";
    }
  </script>

</body>
</html>
