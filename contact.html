<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VitalDiet - Contact</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff4f4;
  margin:0;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:15px 20px;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
  width:40px;
  margin-right:10px;
}

.title{
  font-size:24px;
  color:#b30000;
  font-weight:bold;
}

/* NAVBAR */
.nav{
  background:#eee;
  padding:10px 20px;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.nav a{
  text-decoration:none;
  color:#333;
  font-weight:bold;
  padding:8px 16px;
  border-radius:5px;
}

.nav a:hover{
  background:#ddd;
}

/* FORM */
.container{
  width:90%;
  max-width:500px;
  margin:50px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
  color:#b30000;
  text-align:center;
}

label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  background:#b30000;
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
  width:100%;
}

button:hover{
  background:#990000;
}

#status{
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}

.success{
  background:#d4edda;
  color:#155724;
}

.error{
  background:#f8d7da;
  color:#721c24;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3Q_N9vZXViORiWRyuWDQN9Q8b27SOSChaGw&s" class="logo">
  <div class="title">VitalDiet</div>
</div>

<!-- NAVBAR -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="register.html">Become a Donor</a>
  <a href="donors.html">Donor List</a>
  <a href="request.html">Need Help?</a>
  <a href="diet.html">VitalDiet</a>
  <a href="contact.html">Contact</a>
</div>

<!-- FORM -->
<div class="container">
  <h2>Contact Us</h2>

  <form id="contactForm">

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Message</label>
    <textarea id="message" rows="4" required></textarea>

    <button type="submit">Send</button>

  </form>

  <div id="status"></div>
</div>

<script>

const form = document.getElementById("contactForm");
const status = document.getElementById("status");

form.addEventListener("submit", function(e){

  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if(name && email && message){
    status.textContent = "✅ Message submitted successfully!";
    status.className = "success";
    form.reset();
  } else {
    status.textContent = "❌ Please fill all fields";
    status.className = "error";
  }

});

</script>

</body>
</html>
